# ========================
# HOMARR Deployment
# ========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homarr
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homarr
  template:
    metadata:
      labels:
        app: homarr
    spec:
      hostNetwork: true
      hostname: homarr
      containers:
        - name: homarr
          image: ghcr.io/ajnart/homarr:latest
          env:
            - name: TZ
              value: "America/Montreal"
          ports:
            - containerPort: 7575
              protocol: TCP
          volumeMounts:
            - name: homarr-configs
              mountPath: /app/data/configs
            - name: homarr-icons
              mountPath: /app/public/icons
            - name: homarr-data
              mountPath: /data
      volumes:
        - name: homarr-configs
          hostPath:
            path: /srv/media/Homarr/configs
            type: DirectoryOrCreate
        - name: homarr-icons
          hostPath:
            path: /srv/media/Homarr/icons
            type: DirectoryOrCreate
        - name: homarr-data
          hostPath:
            path: /srv/media/Homarr/data
            type: DirectoryOrCreate
---
# ========================
# JELLYFIN Deployment
# ========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      hostNetwork: true
      hostname: jellyfin
      containers:
        - name: jellyfin
          image: linuxserver/jellyfin:latest
          env:
            - name: PUID
              value: "911"
            - name: PGID
              value: "911"
            - name: UMASK
              value: "002"
            - name: TZ
              value: "America/Montreal"
          ports:
            - containerPort: 8096
              protocol: TCP
            - containerPort: 7359
              protocol: UDP
            - containerPort: 1900
              protocol: UDP
          volumeMounts:
            - name: jellyfin-config
              mountPath: /config
            - name: movies
              mountPath: /data/Movies
            - name: tvshows
              mountPath: /data/TVShows
            - name: music
              mountPath: /data/Music
            - name: books
              mountPath: /data/Books
            - name: mma
              mountPath: /data/MMA
      volumes:
        - name: jellyfin-config
          hostPath:
            path: /srv/media/Jellyfin/config
            type: DirectoryOrCreate
        - name: movies
          hostPath:
            path: /srv/media/Radarr/movies
            type: DirectoryOrCreate
        - name: tvshows
          hostPath:
            path: /srv/media/Sonarr/tvshows
            type: DirectoryOrCreate
        - name: music
          hostPath:
            path: /srv/media/Lidarr/music
            type: DirectoryOrCreate
        - name: books
          hostPath:
            path: /srv/media/Readarr/books
            type: DirectoryOrCreate
        - name: mma
          hostPath:
            path: /srv/media/MMA
            type: DirectoryOrCreate
