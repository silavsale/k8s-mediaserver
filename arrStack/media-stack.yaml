###############################################################################
# Kubernetes Deployments for media services using /srv/media as the base path.
###############################################################################

---
# ========================
# PROWLARR Deployment
# ========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prowlarr
  template:
    metadata:
      labels:
        app: prowlarr
    spec:
      hostNetwork: true
      hostname: prowlarr
      containers:
        - name: prowlarr
          image: linuxserver/prowlarr:latest
          env:
            - name: PUID
              value: "911"
            - name: PGID
              value: "911"
            - name: UMASK
              value: "002"
            - name: TZ
              value: "America/Montreal"
          ports:
            - containerPort: 9696
              protocol: TCP
          volumeMounts:
            - name: prowlarr-config
              mountPath: /config
            - name: prowlarr-backup
              mountPath: /data/Backup
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: prowlarr-config
          hostPath:
            path: /srv/media/Prowlarr/config
            type: DirectoryOrCreate
        - name: prowlarr-backup
          hostPath:
            path: /srv/media/Prowlarr/backup
            type: DirectoryOrCreate
        - name: downloads
          hostPath:
            path: /srv/media/Downloads
            type: DirectoryOrCreate

